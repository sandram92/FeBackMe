services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fe-backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: fe-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_PROXY=http://backend:8001
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm start
    depends_on:
      - backend