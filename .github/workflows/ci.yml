name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Log in to GHCR
        uses: docker/login-action@v3 
        with: 
         registry: ghcr.io
         username: ${{ github.actor }} 
         password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image 
        run: docker build -t ghcr.io/${{ github.repository_owner }}/server-backend:latest . 
      - name: Push backend image 
        run: docker push ghcr.io/${{ github.repository_owner }}/server-backend:latest 

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - run: CI=false npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v3 
        with: 
         registry: ghcr.io
         username: ${{ github.actor }} 
         password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image 
        run: docker build -t ghcr.io/${{ github.repository_owner }}/server-frontend:latest . 
      - name: Push frontend image 
        run: docker push ghcr.io/${{ github.repository_owner }}/server-frontend:latest